services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     stackarr
      POSTGRES_PASSWORD: stackarr
      POSTGRES_DB:       stackarr
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackarr"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stackarr:stackarr@db:5432/stackarr
    # Don't expose port 3000 directly — Caddy proxies it over HTTPS
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@stackarr.local
      PGADMIN_DEFAULT_PASSWORD: stackarr
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
  caddy_data:
  caddy_config:
