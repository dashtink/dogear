services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     dogear
      POSTGRES_PASSWORD: dogear
      POSTGRES_DB:       dogear
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogear"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dogear:dogear@db:5432/dogear
    # Don't expose port 3000 directly — Caddy proxies it over HTTPS
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set DOGEAR_HOST to your Tailscale hostname or domain to enable trusted HTTPS.
      # Leave unset (or as the default below) to use a self-signed cert with local IP.
      # Examples:
      #   Tailscale:  DOGEAR_HOST=my-server.tail1234.ts.net
      #   Domain:     DOGEAR_HOST=library.yourdomain.com
      DOGEAR_HOST: ${DOGEAR_HOST:-:443}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@dogear.local
      PGADMIN_DEFAULT_PASSWORD: dogear
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
  caddy_data:
  caddy_config:
